<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex,nofollow"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07140f" />
  <title>DIGIY RESA — QR réservation</title>
  <meta name="digiy-build" content="resa-qr-sans-bouton-fiche-pro-20260618"/>

  <script>
    window.DIGIY_MODULE       = "RESA";
    window.DIGIY_ABOS_MODULE  = "RESA";
    window.DIGIY_MODULE_LABEL = "Je réserve";
    window.DIGIY_LOGIN_URL    = "./pin.html";
    window.DIGIY_PUBLIC_BASE_URL = window.DIGIY_PUBLIC_BASE_URL || "https://resa-table-resto.digiylyfe.com/";
    window.DIGIY_SUPABASE_URL      = window.DIGIY_SUPABASE_URL || "https://wesqmwjjtsefyjnluosj.supabase.co";
    window.DIGIY_SUPABASE_ANON_KEY = window.DIGIY_SUPABASE_ANON_KEY || "sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
    window.DIGIY_SUPABASE_ANON     = window.DIGIY_SUPABASE_ANON || window.DIGIY_SUPABASE_ANON_KEY;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./guard.js?v=resa-guard-20260531"></script>

  <style>
    body{margin:0;font-family:Arial,system-ui,sans-serif;background:#07140f;color:#ecfff4;padding:16px;text-align:center;font-weight:800}
    .card{max-width:560px;margin:auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:26px;padding:22px;box-shadow:0 22px 70px rgba(0,0,0,.38)}
    h1{font-size:34px;margin:10px 0;line-height:1}.top{color:#facc15;font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:900}
    p{color:rgba(236,255,244,.75);line-height:1.5}.qr{background:white;border-radius:22px;padding:18px;margin:18px auto;color:#07140f}
    .qr img{width:100%;max-width:340px;border-radius:16px}.btn{display:block;margin:10px 0;padding:15px;border-radius:18px;background:#22c55e;color:#041b12;font-weight:900;text-decoration:none;border:0;width:100%;box-sizing:border-box;font-size:16px}
    .btn.gold{background:#facc15;color:#241a00}.btn.blue{background:#38bdf8;color:#061826}.btn.dark{background:rgba(255,255,255,.08);color:#ecfff4;border:1px solid rgba(255,255,255,.14)}
    .small{font-size:13px;color:rgba(236,255,244,.65);word-break:break-all}.pill{display:inline-block;margin:4px 3px;padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);font-size:12px;color:#fff0a8}
    .note{display:none;margin-top:12px;padding:12px;border-radius:16px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fde68a;font-size:14px;line-height:1.45;white-space:pre-wrap;text-align:left}
    .note.ok{display:block;color:#bbf7d0;border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.10)}.note.warn{display:block}.note.bad{display:block;color:#fecaca;border-color:rgba(251,113,133,.25);background:rgba(251,113,133,.10)}
    @media print{body{background:#fff;color:#111}.card{box-shadow:none;border:0}.btn,.small,.top,p,.note,.pillRow{display:none}.qr{padding:0}.qr img{max-width:430px}}
  </style>
</head>
<body>
  <main class="card">
    <div class="top">DIGIY RESA · QR TERRAIN</div>
    <h1 id="title">QR réservation</h1>
    <p id="subtitle">Scanne le QR pour ouvrir directement la demande de réservation. Le client voit un slug public propre, jamais le téléphone dans l’URL.</p>

    <div class="pillRow">
      <span class="pill" id="sessionPill">session…</span>
      <span class="pill" id="publicPill">slug public…</span>
    </div>

    <div class="qr">
      <img id="qrImg" alt="QR réservation DIGIY RESA" src="" />
      <strong id="qrLabel">Mon établissement</strong><br>
      <span>BY DIGIYLYFE</span>
    </div>

    <a class="btn" id="openResa" href="#" target="_blank" rel="noopener">📅 Ouvrir réservation client</a>
    <button class="btn gold" id="printBtn" type="button">🖨️ Imprimer le QR</button>
    <button class="btn gold" id="copyBtn" type="button">📋 Copier lien réservation</button>
    <a class="btn dark" href="./cockpit.html">← Retour cockpit</a>
    <p class="small" id="targetUrl"></p>
    <div class="note warn" id="note"></div>
  </main>

  <script>
    (async function(){
      "use strict";

      const MODULE = "RESA";
      const TABLE = "digiy_resa_public_fiches";
      const PUBLIC_BASE = String(window.DIGIY_PUBLIC_BASE_URL || "https://resa-table-resto.digiylyfe.com/");
      const LOGIN_URL = String(window.DIGIY_LOGIN_URL || "./pin.html");

      const $ = id => document.getElementById(id);

      function safe(v){ return String(v || "").trim(); }
      function normalizeSlug(v){
        return String(v || "")
          .trim().toLowerCase()
          .replace(/\s+/g,"-")
          .replace(/[^a-z0-9-]/g,"")
          .replace(/-+/g,"-")
          .replace(/^-|-$/g,"");
      }
      function isPublicSlugSensitive(v){
        const s = safe(v);
        if(!s) return true;
        if(/\d{7,}/.test(s)) return true;
        if(/token|session|pin|phone|tel|whatsapp/i.test(s)) return true;
        return false;
      }
      function note(msg,type){
        $("note").className = "note " + (type || "warn");
        $("note").textContent = msg || "";
        $("note").style.display = msg ? "block" : "none";
      }
      function publicUrl(page, slug){
        const s = normalizeSlug(slug);
        if(!s || isPublicSlugSensitive(s)) return "";
        const u = new URL(page, PUBLIC_BASE);
        u.searchParams.set("slug", s);
        return u.toString();
      }
      function qrApi(value, size){
        const s = Math.max(160, Number(size) || 520);
        return "https://api.qrserver.com/v1/create-qr-code/?size=" + s + "x" + s + "&margin=18&data=" + encodeURIComponent(value);
      }
      function goPin(reason){
        try{
          sessionStorage.setItem("DIGIY_RESA_RETURN_AFTER_PIN", "qr.html");
          if(reason) sessionStorage.setItem("DIGIY_RESA_PIN_REASON", reason);
        }catch(_){}
        document.body.innerHTML = '<main style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#07140f;color:#ecfff4;font-family:system-ui,sans-serif;text-align:center"><div><h1>🔐 Retour PIN</h1><p style="font-weight:800">Session ou slug RESA absent. On repasse par le coffre.</p></div></main>';
        setTimeout(() => { location.replace(LOGIN_URL); }, 250);
      }
      async function waitGuard(){
        try{
          const guard = window.DIGIY_GUARD;
          if(!guard) return {};
          if(typeof guard.ready === "function"){
            const out = guard.ready({ redirect:false, preserve_validation:true });
            if(out && typeof out.then === "function") await out;
          }else if(guard.ready && typeof guard.ready.then === "function"){
            await guard.ready;
          }
          if(typeof guard.getSession === "function") return guard.getSession() || guard.state || {};
          return guard.state || {};
        }catch(e){
          console.warn("[RESA QR] guard", e);
          return {};
        }
      }
      function collectLocal(key){
        try{ return localStorage.getItem(key) || ""; }catch(_){ return ""; }
      }
      function collectLocalSlug(){
        return normalizeSlug(
          collectLocal("digiy_resa_slug") ||
          collectLocal("digiy_resa_last_slug") ||
          collectLocal("resa_slug") ||
          collectLocal("DIGIY_RESA_SLUG") ||
          collectLocal("digiy_abos_slug")
        );
      }
      function resolveProSlug(state){
        const st = state || {};
        const candidates = [
          st.slug, st.resa_slug, st.internal_slug, st.pro_slug, st.subscription_slug,
          st.public_slug, st.business_slug, st.etablissement_slug,
          st.payload && st.payload.slug,
          st.payload && st.payload.resa_slug,
          st.payload && st.payload.internal_slug,
          collectLocalSlug()
        ];
        for(const c of candidates){
          const s = normalizeSlug(c);
          if(s) return s;
        }
        return "";
      }
      function getLocalFiche(proSlug){
        try{
          const raw = localStorage.getItem("DIGIY_RESA_FICHE_V2_" + proSlug);
          return raw ? JSON.parse(raw) : {};
        }catch(_){ return {}; }
      }
      async function findSqlRow(slug){
        if(!slug || !window.supabase?.createClient) return null;
        const client = window.supabase.createClient(window.DIGIY_SUPABASE_URL, window.DIGIY_SUPABASE_ANON_KEY);
        const cols = ["internal_slug","resa_slug","slug","public_slug"];
        for(const col of cols){
          try{
            const { data, error } = await client
              .from(TABLE)
              .select("*")
              .eq("module", MODULE)
              .eq("is_active", true)
              .in("status", ["published","active"])
              .eq(col, slug)
              .limit(1)
              .maybeSingle();
            if(error) continue;
            if(data) return data;
          }catch(_){}
        }
        return null;
      }
      function firstCleanPublicSlug(row, local){
        const candidates = [
          row && row.public_slug,
          row && row.slug,
          local && local.publicSlug,
          collectLocal("digiy_resa_public_slug"),
          collectLocal("digiy_resa_last_public_slug")
        ];
        for(const c of candidates){
          const s = normalizeSlug(c);
          if(s && !isPublicSlugSensitive(s)) return s;
        }
        return "";
      }
      async function copyText(text){
        try{
          if(navigator.clipboard?.writeText) return navigator.clipboard.writeText(text);
        }catch(_){}
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly","");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        let ok = false;
        try{ ok = document.execCommand("copy"); }catch(_){}
        ta.remove();
        if(!ok) throw new Error("copy_failed");
      }

      const state = await waitGuard();
      const proSlug = resolveProSlug(state);

      if(!proSlug){
        goPin("slug RESA absent");
        return;
      }

      $("sessionPill").textContent = "slug PRO : " + proSlug;

      const local = getLocalFiche(proSlug);
      const row = await findSqlRow(proSlug);
      const publicSlug = firstCleanPublicSlug(row, local);

      if(!publicSlug){
        $("publicPill").textContent = "slug public absent";
        $("qrImg").src = qrApi(PUBLIC_BASE, 520);
        $("openResa").href = "./fiche.html";
        $("targetUrl").textContent = "Slug public absent. Ouvre la fiche PRO pour renseigner le slug public.";
        note("⚠️ Session PRO trouvée, mais aucun slug public propre n’est disponible. Ouvre la fiche PRO, renseigne le slug public, puis reviens ici.", "warn");
        return;
      }

      const businessName = safe((row && (row.business_name || row.name)) || local.businessName || "Mon établissement");
      const reservationUrl = safe((row && row.reservation_url) || local.reservationUrl) || publicUrl("reserver.html", publicSlug);
      const ficheUrl = safe((row && row.fiche_url) || local.publicFicheUrl) || publicUrl("fiche.html", publicSlug);

      try{
        localStorage.setItem("digiy_resa_slug", proSlug);
        localStorage.setItem("digiy_resa_last_slug", proSlug);
        localStorage.setItem("digiy_resa_public_slug", publicSlug);
        localStorage.setItem("digiy_resa_last_public_slug", publicSlug);
        localStorage.setItem("digiy_resa_public_url", reservationUrl);
      }catch(_){}

      $("publicPill").textContent = "slug public : " + publicSlug;
      $("title").textContent = "QR " + businessName;
      $("qrLabel").textContent = businessName;
      $("targetUrl").textContent = reservationUrl;
      $("openResa").href = reservationUrl;
      $("qrImg").src = qrApi(reservationUrl, 520);
      note("✅ QR réservation prêt. Teste-le sur téléphone avant impression.", "ok");

      $("printBtn").addEventListener("click", function(){ window.print(); });
      $("copyBtn").addEventListener("click", async function(){
        try{
          await copyText(reservationUrl);
          note("✅ Lien réservation copié.", "ok");
        }catch(_){
          note("Copie manuelle :\n" + reservationUrl, "warn");
        }
      });
    })();
  </script>
</body>
</html>
