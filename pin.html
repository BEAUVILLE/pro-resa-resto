<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#061b14"/>
  <title>DIGIY — PIN RESA</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#061b14; --card:#0b2a1f; --line:rgba(255,255,255,.14);
      --text:#eafff1; --muted:rgba(234,255,241,.72);
      --gold:#facc15; --ok:#22c55e; --bad:#fb7185; --warn:#f59e0b;
      --shadow:0 18px 55px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif;background:radial-gradient(1200px 800px at 50% 10%, rgba(250,204,21,.08), transparent 60%), var(--bg);color:var(--text)}
    .card{width:min(520px,92vw);background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px 16px}
    .row{display:flex;gap:10px;align-items:center;justify-content:space-between}
    h1{font-size:18px;margin:0}
    .tag{font-size:12px;color:var(--muted)}
    .sep{height:1px;background:var(--line);margin:14px 0}
    label{display:block;font-size:13px;color:var(--muted);margin:10px 0 6px}
    input{width:100%;padding:14px 12px;border-radius:14px;border:1px solid var(--line);background:#071f16;color:var(--text);outline:none}
    input:focus{border-color:rgba(250,204,21,.55)}
    button{width:100%;padding:13px 12px;border-radius:14px;border:1px solid rgba(250,204,21,.35);background:rgba(250,204,21,.12);color:var(--text);font-weight:700;cursor:pointer}
    button:hover{background:rgba(250,204,21,.18)}
    .msg{margin-top:12px;font-size:13px;color:var(--muted)}
    .msg.ok{color:var(--ok)}
    .msg.bad{color:var(--bad)}
    .mini{font-size:12px;color:var(--muted);margin-top:10px}
    a{color:var(--gold);text-decoration:none}
  </style>
</head>

<body>
  <div class="card">
    <div class="row">
      <h1>🔐 PIN — RESA</h1>
      <div class="tag" id="slugTag">slug: —</div>
    </div>

    <div class="sep"></div>

    <div class="mini">
      Ici on vérifie <b>le PIN</b> (qui autorise la personne).  
      L’<b>abonnement</b> sera vérifié ensuite dans le cockpit.
    </div>

    <label for="pin">Ton PIN</label>
    <input id="pin" inputmode="numeric" autocomplete="one-time-code" placeholder="Ex: 1234"/>

    <div class="sep"></div>

    <button id="btn">Entrer</button>
    <div class="msg" id="msg"></div>

    <div class="mini" style="margin-top:12px">
      Pas de slug ? Passe par ton QR / GO PIN.  
    </div>
  </div>

<script>
  const MODULE_LABEL = "RESA";
  // ⚠️ module “PIN” distinct du module “PAY”
  const MODULE_CODE = "resa_pro";

  const SUPABASE_URL = window.DIGIY_SUPABASE_URL || "https://YOUR_PROJECT.supabase.co";
  const SUPABASE_ANON_KEY = window.DIGIY_SUPABASE_ANON || "YOUR_SUPABASE_ANON_KEY";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession:false } });

  const $ = (id)=>document.getElementById(id);
  const slug = new URL(location.href).searchParams.get("slug")?.trim() || "";

  $("slugTag").textContent = "slug: " + (slug || "—");

  function setMsg(text, kind){
    const el = $("msg");
    el.className = "msg" + (kind ? (" " + kind) : "");
    el.textContent = text || "";
  }

  async function enter(){
    setMsg("", "");
    const pin = $("pin").value.trim();
    if (!slug) return setMsg("❌ Slug manquant. Passe par GO PIN / QR.", "bad");
    if (!pin) return setMsg("❌ PIN obligatoire.", "bad");

    $("btn").disabled = true;
    try{
      // RPC: digiy_verify_access(p_slug, p_pin, p_module)
      const { data, error } = await sb.rpc("digiy_verify_access", {
        p_slug: slug,
        p_pin: pin,
        p_module: MODULE_CODE
      });

      if (error) throw error;
      if (!data?.ok) return setMsg("❌ PIN invalide ou expiré.", "bad");

      // data attendu: {ok:true, phone, owner_id, slug}
      const session = {
        slug,
        phone: data.phone || null,
        owner_id: data.owner_id || null,
        module_pin: MODULE_CODE,
        at: new Date().toISOString()
      };
      localStorage.setItem("DIGIY_ACCESS", JSON.stringify(session));

      setMsg("✅ PIN OK. Ouverture du cockpit…", "ok");
      setTimeout(()=> location.href = "./cockpit.html?slug=" + encodeURIComponent(slug), 450);
    }catch(e){
      setMsg("❌ Erreur: " + (e?.message || e), "bad");
    }finally{
      $("btn").disabled = false;
    }
  }

  $("btn").addEventListener("click", enter);
  $("pin").addEventListener("keydown", (e)=>{ if(e.key==="Enter") enter(); });
</script>
</body>
</html>
