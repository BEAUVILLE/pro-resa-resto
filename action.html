<script>
(function(){
function $(id){return document.getElementById(id)}function toast(m){var t=$('toast');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none'},2200)}function V(){return (window.DIGIY_GO_VOCABS&&window.DIGIY_GO_VOCABS.RESA)||window.DIGIY_GO_RESA_VOCAB||{}}function matchWords(raw,groups){raw=String(raw||'').toLowerCase();var out=[];Object.keys(groups||{}).forEach(function(k){(groups[k]||[]).forEach(function(w){if(raw.indexOf(String(w).toLowerCase())>-1&&out.indexOf(k)<0)out.push(k)})});return out}

function prepare(){var v=V(),raw=$('txt').value.trim(),intents=matchWords(raw,v.intents),fields=matchWords(raw,v.fields);var msg=[(v.label||'RESA')+' — brouillon préparé','Texte : '+raw,'Intentions : '+(intents.join(', ')||'à vérifier'),'Champs métier : '+(fields.join(', ')||'à compléter'),'','Doctrine : '+(v.doctrine||''),'Validation humaine obligatoire. Rien n’est confirmé automatiquement.'].join('\n');$('msg').textContent=msg;try{localStorage.setItem('DIGIY_RESA_GO_LATEST',JSON.stringify({raw:raw,intents:intents,fields:fields,preparedAt:new Date().toISOString()}))}catch(e){}$('status').textContent='Brouillon RESA préparé avec vocabulaire métier.';toast('Brouillon RESA prêt')}

})();
