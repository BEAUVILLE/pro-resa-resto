<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#061b14"/>
  <title>DIGIY RESA — Cockpit</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./guard.js?v=resa-1"></script>

  <style>
    :root{
      --bg:#061b14; --card:#0b2a1f; --line:rgba(255,255,255,.14);
      --text:#eafff1; --muted:rgba(234,255,241,.72);
      --gold:#facc15; --ok:#22c55e; --bad:#fb7185; --warn:#f59e0b;
      --shadow:0 18px 55px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(1200px 800px at 50% 10%, rgba(250,204,21,.08), transparent 60%), var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif}
    header{padding:16px 14px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;justify-content:space-between}
    .wrap{width:min(980px,94vw);margin:0 auto}
    .pill{font-size:12px;color:var(--muted);border:1px solid var(--line);padding:6px 10px;border-radius:999px}
    .grid{display:grid;grid-template-columns:1fr;gap:12px;padding:14px}
    .card{background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:16px}
    .row{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    h1{font-size:16px;margin:0}
    .msg{font-size:13px;color:var(--muted);margin-top:8px}
    .msg.ok{color:var(--ok)} .msg.bad{color:var(--bad)} .msg.warn{color:var(--warn)}
    button,a.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 12px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.02);color:var(--text);text-decoration:none;cursor:pointer;font-weight:700}
    a.primary{border-color:rgba(250,204,21,.35);background:rgba(250,204,21,.12)}
    a.primary:hover{background:rgba(250,204,21,.18)}
    button:hover{background:rgba(255,255,255,.05)}
    .muted{color:var(--muted);font-size:12px}
    .panel{margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
  </style>
</head>

<body>
  <header>
    <div class="wrap row">
      <h1>📅 DIGIY RESA — Cockpit</h1>
      <div class="pill" id="pill">…</div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">

      <div class="card">
        <div class="row">
          <div>
            <div class="muted">État</div>
            <div class="msg" id="stateMsg">Chargement…</div>
          </div>
          <div class="row">
            <button id="btnCheck">🔄 Vérifier mon accès</button>
            <a class="btn" id="btnPin" href="./pin.html">🔐 PIN</a>
            <a class="btn primary" id="btnPay" href="#" style="display:none">💳 Activer</a>
          </div>
        </div>

        <div class="panel muted" id="details"></div>
      </div>

      <div class="card">
        <div class="muted">UI RESA (placeholder)</div>
        <div class="msg">
          Ici tu poses ton planning / check-in / check-out / inbox.  
          Le guard ne te bloque pas par redirect: il te donne l’état, et toi tu pilotes.
        </div>
      </div>

    </div>
  </main>

<script>
  const $ = (id)=>document.getElementById(id);

  function setState(text, kind){
    const el = $("stateMsg");
    el.className = "msg" + (kind ? (" " + kind) : "");
    el.textContent = text;
  }

  function render(st){
    const slug = st?.slug || "—";
    $("pill").textContent = "slug: " + slug;

    $("btnPin").href = "./pin.html?slug=" + encodeURIComponent(st?.slug || "");

    const lines = [
      `module=${st?.module}`,
      `slug=${st?.slug}`,
      `pin_ok=${st?.pin_ok}`,
      `access_ok=${st?.access_ok}`,
      `phone=${st?.phone || "—"}`,
      `reason=${st?.reason || "—"}`
    ];
    $("details").textContent = lines.join("  |  ");

    // Cas 1: pas de slug → message terrain
    if (!st?.slug){
      $("btnPay").style.display = "none";
      setState("⚠️ Slug manquant. Passe par GO PIN / QR pour entrer.", "warn");
      return;
    }

    // Cas 2: slug inconnu → renvoyer vers GO PIN
    if (st?.reason === "slug_unknown"){
      $("btnPay").style.display = "none";
      setState("⚠️ Slug inconnu. Passe par GO PIN / QR (ou crée l’abo test pour générer le slug).", "warn");
      return;
    }

    // Cas 3: abonnement KO → proposer activer (sans boucler)
    if (!st?.access_ok){
      $("btnPay").href = st?.pay_url || "#";
      $("btnPay").style.display = "inline-flex";
      setState("💳 Abonnement RESA inactif. Active pour déverrouiller le module.", "bad");
      return;
    }

    // Cas 4: abonnement OK → accès
    $("btnPay").style.display = "none";
    setState("✅ Abonnement OK. Cockpit ouvert.", "ok");
  }

  async function boot(){
    const st = await window.DIGIY_GUARD.ready;
    if (!st?.ok){
      setState("❌ Guard error: " + (st?.error || "unknown"), "bad");
      return;
    }
    render(st);
  }

  $("btnCheck").addEventListener("click", async ()=>{
    const st = await window.DIGIY_GUARD.refresh();
    render(st);
  });

  boot();
</script>
</body>
</html>
