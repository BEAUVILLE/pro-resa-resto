  <style>
    :root{
      --bg:#061b14; --card:#0b2a1f; --line:rgba(255,255,255,.14);
      --text:#eafff1; --muted:rgba(234,255,241,.72);
      --gold:#facc15; --ok:#22c55e; --bad:#fb7185; --warn:#f59e0b;
      --shadow:0 18px 55px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh;
      font-family:system-ui,-apple-system,Segoe UI,Roboto;
      background:radial-gradient(1200px 800px at 50% 10%, rgba(250,204,21,.08), transparent 60%), var(--bg);
      color:var(--text);
    }
    header{
      border-bottom:1px solid var(--line);
      padding:14px 14px;
    }
    .wrap{width:min(980px,94vw);margin:0 auto}
    .row{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .pill{
      border:1px solid var(--line);
      background:rgba(250,204,21,.10);
      padding:7px 10px;border-radius:999px;
      font-size:12px;font-weight:900;
    }
    .grid{display:grid;grid-template-columns:1fr;gap:12px;padding:14px}
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:16px;
    }
    h1{margin:0;font-size:16px}
    .muted{color:var(--muted);font-size:12px}
    .msg{margin-top:8px;font-size:13px;color:var(--muted)}
    .msg.ok{color:var(--ok)} .msg.bad{color:var(--bad)} .msg.warn{color:var(--warn)}
    button,a.btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:11px 12px;border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      color:var(--text);text-decoration:none;cursor:pointer;font-weight:900;
    }
    a.primary{border-color:rgba(250,204,21,.35);background:rgba(250,204,21,.12)}
    a.primary:hover{background:rgba(250,204,21,.18)}
    button:hover,a.btn:hover{background:rgba(255,255,255,.05)}
    .panel{margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
  </style>
</head>

<body>
  <header>
    <div class="wrap row">
      <div>
        <h1>📅 DIGIY PRO-RESA — Cockpit</h1>
        <div class="muted">PIN = personne • Abonnement = module</div>
      </div>
      <div class="pill" id="pill">slug: —</div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">

      <div class="card">
        <div class="row">
          <div>
            <div class="muted">État</div>
            <div class="msg" id="stateMsg">Chargement…</div>
          </div>
          <div class="row">
            <button id="btnCheck">🔄 Vérifier mon accès</button>
            <a class="btn" id="btnPin" href="./index.html">🔐 Refaire PIN</a>
            <a class="btn primary" id="btnPay" href="#" style="display:none">💳 Activer RESA</a>
          </div>
        </div>

        <div class="panel muted" id="details"></div>
      </div>

      <div class="card" id="appCard" style="display:none">
        <div class="muted">PRO-RESA — UI</div>
        <div class="msg">
          Ici tu poses ton planning, tes réservations, ton inbox, etc.
          (Le guard te donne l’état, toi tu affiches l’app.)
        </div>
      </div>

    </div>
  </main>

<script>
  const $ = (id)=>document.getElementById(id);

  function setState(text, kind){
    const el = $("stateMsg");
    el.className = "msg" + (kind ? (" " + kind) : "");
    el.textContent = text;
  }

  function render(st){
    $("pill").textContent = "slug: " + (st?.slug || "—");
    $("btnPin").href = "./index.html?slug=" + encodeURIComponent(st?.slug || "");

    const lines = [
      `module=${st?.module}`,
      `slug=${st?.slug}`,
      `pin_ok=${st?.pin_ok}`,
      `access_ok=${st?.access_ok}`,
      `phone=${st?.phone || "—"}`,
      `reason=${st?.reason || "—"}`
    ];
    $("details").textContent = lines.join("  |  ");

    // 1) slug manquant
    if (!st?.slug){
      $("btnPay").style.display = "none";
      $("appCard").style.display = "none";
      setState("⚠️ Slug manquant. Passe par GO PIN / QR.", "warn");
      return;
    }

    // 2) slug inconnu
    if (st?.reason === "slug_unknown"){
      $("btnPay").style.display = "none";
      $("appCard").style.display = "none";
      setState("⚠️ Slug inconnu. Active/valide l’abo test pour créer le slug.", "warn");
      return;
    }

    // 3) PIN pas OK (la personne)
    if (!st?.pin_ok){
      $("btnPay").style.display = "none";
      $("appCard").style.display = "none";
      setState("🔐 PIN requis. Clique “Refaire PIN”.", "warn");
      return;
    }

    // 4) abo KO → bouton activer
    if (!st?.access_ok){
      $("btnPay").href = st?.pay_url || "#";
      $("btnPay").style.display = "inline-flex";
      $("appCard").style.display = "none";
      setState("💳 Abonnement RESA inactif. Active pour déverrouiller.", "bad");
      return;
    }

    // 5) accès OK → show app
    $("btnPay").style.display = "none";
    $("appCard").style.display = "block";
    setState("✅ Abonnement OK. Cockpit ouvert.", "ok");
  }

  async function boot(){
    const st = await window.DIGIY_GUARD.ready;
    if (!st?.ok){
      setState("❌ Guard error: " + (st?.error || "unknown"), "bad");
      return;
    }
    render(st);
  }

  $("btnCheck").addEventListener("click", async ()=>{
    const st = await window.DIGIY_GUARD.refresh();
    render(st);
  });

  boot();
</script>
</body>
</html>
