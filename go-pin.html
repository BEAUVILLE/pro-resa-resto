<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#061b14"/>
  <meta name="description" content="DIGIY RESA PRO — redirection vers la porte PIN sécurisée."/>
  <title>DIGIY RESA PRO — GO PIN</title>

  <style>
    :root{
      --bg:#061b14;
      --card:#0b2a1f;
      --line:rgba(255,255,255,.12);
      --text:#eafff1;
      --muted:rgba(234,255,241,.72);
      --gold:#facc15;
      --shadow:0 18px 55px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    body{
      display:grid;
      place-items:center;
      padding:24px;
    }

    .card{
      width:min(560px,100%);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:24px;
      text-align:center;
    }

    .eyebrow{
      color:var(--gold);
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      font-weight:900;
      margin-bottom:8px;
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(1.35rem,3.8vw,2rem);
      line-height:1.08;
    }

    p{
      margin:0;
      color:var(--muted);
      line-height:1.55;
    }

    .spinner{
      width:42px;
      height:42px;
      margin:0 auto 16px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.12);
      border-top-color:var(--gold);
      animation:spin .9s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .links{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:170px;
      padding:12px 16px;
      border-radius:14px;
      border:1px solid var(--line);
      background:linear-gradient(180deg,#103428,#0c271e);
      color:var(--text);
      text-decoration:none;
      font-weight:800;
    }

    .btn.alt{
      background:rgba(255,255,255,.04);
      color:var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <div class="eyebrow">DIGIY GO PIN</div>
    <h1>Ouverture de la porte PIN…</h1>
    <p id="msg">Redirection en cours vers votre accès professionnel.</p>

    <div class="links">
      <a class="btn" id="fallbackPin" href="./pin.html">Aller à la porte PIN</a>
      <a class="btn alt" id="fallbackTarget" href="./cockpit.html">Voir la cible</a>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const $ = (id) => document.getElementById(id);

      const PUBLIC_BASE_URL = "https://resa-table-resto.digiylyfe.com/";
      const PUBLIC_FICHE_PATH = "fiche.html";

      function normalizeSlug(v){
        return String(v || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "-")
          .replace(/[^a-z0-9-]/g, "")
          .replace(/-+/g, "-")
          .replace(/^-|-$/g, "");
      }

      function normalizePhone(v){
        const raw = String(v || "").trim();
        const cleaned = raw.replace(/[^\d+]/g, "");
        const digits = cleaned.replace(/[^\d]/g, "");
        if (!digits) return "";
        return cleaned.startsWith("+") ? `+${digits}` : digits;
      }

      function normalizeTarget(v){
        const t = String(v || "").trim().toLowerCase();
        if (t === "planning") return "planning";
        if (t === "dashboard") return "dashboard";
        if (t === "public") return "public";
        return "cockpit";
      }

      function storageSet(key, value){
        if (value == null || value === "") return;
        try { localStorage.setItem(key, String(value)); } catch (_) {}
        try { sessionStorage.setItem(key, String(value)); } catch (_) {}
      }

      function buildPublicUrl(slugValue = ""){
        const url = new URL(PUBLIC_FICHE_PATH, PUBLIC_BASE_URL);
        if (slugValue) url.searchParams.set("slug", slugValue);
        return url.toString();
      }

      const qs = new URLSearchParams(location.search);

      const slug = normalizeSlug(qs.get("slug") || "");
      const phone = normalizePhone(qs.get("phone") || "");
      const target = normalizeTarget(qs.get("target") || "");
      const explicitReturn = String(qs.get("return") || "").trim();

      let targetUrl;

      if (target === "planning") {
        targetUrl = new URL("./planning.html", location.href);
      } else if (target === "dashboard") {
        targetUrl = new URL("./dashboard-pro.html", location.href);
      } else if (target === "public") {
        targetUrl = new URL(buildPublicUrl(slug));
      } else {
        targetUrl = new URL("./cockpit.html", location.href);
      }

      const pinUrl = new URL("./pin.html", location.href);

      if (slug) {
        pinUrl.searchParams.set("slug", slug);

        storageSet("digiy_resa_slug", slug);
        storageSet("digiy_resa_last_slug", slug);
        storageSet("digiy_last_slug", slug);
        storageSet("DIGIY_SLUG", slug);

        if (target !== "public") {
          targetUrl.searchParams.set("slug", slug);
        }
      }

      if (phone) {
        pinUrl.searchParams.set("phone", phone);
        storageSet("digiy_resa_phone", phone);

        if (target !== "public") {
          targetUrl.searchParams.set("phone", phone);
        }
      }

      if (target) {
        pinUrl.searchParams.set("target", target);
      }

      if (explicitReturn) {
        pinUrl.searchParams.set("return", explicitReturn);
      }

      const fallbackPin = $("fallbackPin");
      const fallbackTarget = $("fallbackTarget");
      const msg = $("msg");

      fallbackPin.href = pinUrl.toString();
      fallbackTarget.href = targetUrl.toString();

      if (target === "public") {
        fallbackTarget.textContent = "Voir la fiche publique";
        fallbackTarget.setAttribute("target", "_blank");
        fallbackTarget.setAttribute("rel", "noopener");
      } else if (target === "planning") {
        fallbackTarget.textContent = "Voir le planning";
      } else if (target === "dashboard") {
        fallbackTarget.textContent = "Voir le dashboard";
      } else {
        fallbackTarget.textContent = "Voir le cockpit";
      }

      const targetLabel =
        target === "planning" ? "planning" :
        target === "dashboard" ? "dashboard" :
        target === "public" ? "fiche publique" :
        "cockpit";

      if (slug && phone) {
        msg.textContent = `Slug et téléphone détectés. Redirection vers la porte PIN sécurisée, puis vers ${targetLabel}.`;
      } else if (slug) {
        msg.textContent = `Slug détecté. Redirection vers la porte PIN sécurisée, puis vers ${targetLabel}.`;
      } else {
        msg.textContent = "Aucun slug fourni. Redirection vers la porte PIN générale.";
      }

      setTimeout(() => {
        location.replace(pinUrl.toString());
      }, 250);
    })();
  </script>
</body>
</html>
