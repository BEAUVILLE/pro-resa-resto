<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#061b14"/>
  <title>DIGIY — GO PIN (RESA)</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{--bg:#061b14;--card:#0b2a1f;--line:rgba(255,255,255,.14);--text:#eafff1;--muted:rgba(234,255,241,.72);--gold:#facc15;--bad:#fb7185;--ok:#22c55e;--shadow:0 18px 55px rgba(0,0,0,.45);}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif;background:radial-gradient(1200px 800px at 50% 10%, rgba(250,204,21,.08), transparent 60%), var(--bg);color:var(--text)}
    .card{width:min(520px,92vw);background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px 16px}
    .msg{margin-top:10px;font-size:13px;color:var(--muted)}
    .msg.ok{color:var(--ok)} .msg.bad{color:var(--bad)}
  </style>
</head>

<body>
  <div class="card">
    <div style="font-weight:800">🚪 GO PIN — RESA</div>
    <div class="msg" id="msg">Vérification…</div>
  </div>

<script>
  const SUPABASE_URL = window.DIGIY_SUPABASE_URL || "https://YOUR_PROJECT.supabase.co";
  const SUPABASE_ANON_KEY = window.DIGIY_SUPABASE_ANON || "YOUR_SUPABASE_ANON_KEY";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{persistSession:false} });

  const slug = new URL(location.href).searchParams.get("slug")?.trim() || "";
  const msg = document.getElementById("msg");

  function set(text, kind){
    msg.className = "msg" + (kind ? (" " + kind) : "");
    msg.textContent = text;
  }

  async function run(){
    if (!slug) return set("❌ Slug manquant. Utilise ton QR GO PIN avec ?slug=…", "bad");

    try{
      // Table exemple: go_pins (slug, is_active, module_pin, ...)
      // Si ta table s'appelle autrement, adapte ici.
      const { data, error } = await sb
        .from("go_pins")
        .select("slug,is_active")
        .eq("slug", slug)
        .maybeSingle();

      if (error) throw error;

      if (!data?.slug || data.is_active === false){
        return set("❌ PIN non actif pour ce slug. Contacte l’admin.", "bad");
      }

      set("✅ OK. Redirection vers PIN…", "ok");
      setTimeout(()=> location.href = "./pin.html?slug=" + encodeURIComponent(slug), 350);
    }catch(e){
      set("❌ Erreur: " + (e?.message || e), "bad");
    }
  }

  run();
</script>
</body>
</html>
