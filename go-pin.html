<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#061b14"/>
  <title>DIGIY — GO PIN</title>
</head>
<body>
<script>
  const slug = (new URL(location.href).searchParams.get("slug") || "").trim();
  if(!slug){
    document.body.innerHTML = "❌ Slug manquant. Utilise ?slug=...";
  }else{
    location.replace("./pin.html?slug=" + encodeURIComponent(slug));
  }
</script>
</body>
</html>
