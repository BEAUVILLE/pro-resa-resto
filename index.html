<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#061b14"/>
  <title>DIGIY PRO-RESA — Porte PIN</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#061b14; --card:#0b2a1f; --line:rgba(255,255,255,.14);
      --text:#eafff1; --muted:rgba(234,255,241,.72);
      --gold:#facc15; --ok:#22c55e; --bad:#fb7185;
      --shadow:0 18px 55px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto;
      background:radial-gradient(circle at top, rgba(250,204,21,.10), transparent 55%),
                 linear-gradient(135deg,#04160f,#0a2b1f);
      color:var(--text); padding:18px;
    }
    .card{
      width:min(520px,92vw);
      background:linear-gradient(145deg,rgba(11,42,31,.96),rgba(6,35,25,.96));
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:18px;
    }
    .top{display:flex;justify-content:space-between;align-items:center}
    .ico{
      width:46px;height:46px;border-radius:50%;
      display:grid;place-items:center;
      background:radial-gradient(circle at 30% 0,var(--gold),transparent 60%);
      color:#062015;font-weight:900;
      border:1px solid rgba(250,204,21,.35);
    }
    .t{font-weight:900;font-size:13px;letter-spacing:.1em}
    .sub{font-size:12px;color:var(--muted)}
    .pill{
      border:1px solid var(--line);
      background:rgba(250,204,21,.10);
      padding:6px 10px;border-radius:999px;
      font-size:12px;font-weight:900;
    }
    .sep{height:1px;background:var(--line);margin:14px 0}
    label{display:block;font-size:12px;color:var(--muted);margin:8px 0 6px}
    input{
      width:100%; padding:14px;
      border-radius:14px; border:1px solid var(--line);
      background:rgba(0,0,0,.25); color:var(--text);
      font-size:16px; font-weight:900; letter-spacing:.15em;
    }
    button{
      width:100%; margin-top:12px; padding:14px;
      border-radius:14px; border:none;
      background:linear-gradient(90deg,var(--ok),var(--gold));
      color:#062015; font-weight:900; font-size:15px;
      cursor:pointer;
    }
    button:disabled{opacity:.6}
    .msg{margin-top:12px;font-size:12px;color:var(--muted)}
    .ok{color:var(--ok); font-weight:900}
    .bad{color:var(--bad); font-weight:900}
    .row{display:flex; gap:10px; margin-top:10px}
    .link{
      flex:1; text-align:center;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      padding:10px;border-radius:14px;
      font-weight:900; color:var(--text);
      text-decoration:none;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="top">
      <div style="display:flex;gap:10px;align-items:center">
        <div class="ico">🦅</div>
        <div>
          <div class="t">PORTE PIN — PRO-RESA</div>
          <div class="sub" id="subtitle">Chargement…</div>
        </div>
      </div>
      <div class="pill">PRO-RESA</div>
    </div>

    <div class="sep"></div>

    <div style="font-size:12px;color:var(--muted)">
      SLUG : <b id="slugBox">—</b>
    </div>

    <label for="pin">Entre ton PIN</label>
    <input id="pin" type="password" inputmode="numeric" maxlength="8"/>

    <button id="go">🚀 ENTRER</button>

    <div class="msg" id="msg"></div>

    <div class="row" id="linksRow" style="display:none">
      <a class="link" id="payLink" target="_blank">💳 Activer module</a>
      <a class="link" href="https://wa.me/221771342889" target="_blank">🛟 Support</a>
    </div>
  </div>

<script>
(async () => {

  const PIN_MODULE = "pro_resa";
  const PAY_MODULE = "RESA";
  const NEXT_URL = "cockpit.html";

  const SUPABASE_URL = "https://wesqmwjjtsefyjnluosj.supabase.co";
  const SUPABASE_ANON_KEY =
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indlc3Ftd2pqdHNlZnlqbmx1b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxNzg4ODIsImV4cCI6MjA4MDc1NDg4Mn0.dZfYOc2iL2_wRYL3zExZFsFSBK6AbMeOid2LrIjcTdA";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const slug = (new URL(location.href).searchParams.get("slug") || "").trim();

  const msgBox = document.getElementById("msg");
  const goBtn = document.getElementById("go");
  const linksRow = document.getElementById("linksRow");

  document.getElementById("slugBox").textContent = slug || "—";
  document.getElementById("subtitle").textContent =
    slug ? "Accès sécurisé — PIN requis" : "SLUG manquant";

  const payUrl = new URL("https://commencer-a-payer.digiylyfe.com/");
  payUrl.searchParams.set("module", PAY_MODULE);
  if(slug) payUrl.searchParams.set("slug", slug);
  document.getElementById("payLink").href = payUrl.toString();

  if(!slug){
    msgBox.innerHTML = "<span class='bad'>❌ SLUG manquant.</span>";
    goBtn.disabled = true;
    linksRow.style.display = "flex";
    return;
  }

  async function enter(){
    const pin = document.getElementById("pin").value.trim();
    if(pin.length < 3){
      msgBox.innerHTML = "<span class='bad'>❌ PIN invalide.</span>";
      return;
    }

    goBtn.disabled = true;
    msgBox.innerHTML = "⏳ Vérification…";

    const { data, error } = await sb.rpc("digiy_verify_access", {
      p_slug: slug,
      p_pin: pin,
      p_module: PIN_MODULE
    });

    if(error){
      goBtn.disabled = false;
      msgBox.innerHTML = "<span class='bad'>❌ Erreur serveur.</span>";
      linksRow.style.display = "flex";
      return;
    }

    if(!data?.ok){
      goBtn.disabled = false;
      msgBox.innerHTML = "<span class='bad'>❌ PIN incorrect.</span>";
      linksRow.style.display = "flex";
      return;
    }

    localStorage.setItem("DIGIY_ACCESS", JSON.stringify({
      slug: slug,
      phone: data.phone || null,
      owner_id: data.owner_id || null,
      ts: Date.now()
    }));

    msgBox.innerHTML = "<span class='ok'>✅ Accès validé.</span>";

    setTimeout(()=>{
      const next = new URL(NEXT_URL, location.href);
      next.searchParams.set("slug", slug);
      location.assign(next.toString());
    }, 400);
  }

  goBtn.addEventListener("click", enter);
  document.getElementById("pin")
    .addEventListener("keydown", e => { if(e.key==="Enter") enter(); });

})();
</script>

</body>
</html>
