  <style>
    :root{
      --green:#1e7a46;--green2:#155a34;--green3:#0e4226;
      --gold:#c4973f;--gold2:#fff0a8;--ink:#f0fff5;

  <main>
    <div class="brand"><span>📅</span><span>DIGIY RESA PRO</span></div>
    <section class="card">
      <h1>Bonjour.</h1>
      <nav aria-label="Actions RESA PRO">
        <a href="./atelier.html#add">Nouvelle réservation</a>
        <a href="./atelier.html#planning">Mon planning</a>

        <button id="shareWhatsApp" type="button">Partager sur WhatsApp</button>
      </nav>
      <p id="status" role="status" aria-live="polite" hidden></p>
    </section>
    <p class="foot">Paiement direct au professionnel · 0 % commission DIGIY</p>
  </main>

  <script>
    (()=>{
      "use strict";

      const shareButton=document.getElementById("shareWhatsApp");
      const statusBox=document.getElementById("status");

      const SESSION_KEYS=[
        "digiy_resa_session","digiy_resa_guard_session","digiy_guard_resa_session",
        "DIGIY_RESA_SESSION","DIGIY_RESA_ACCESS","DIGIY_MODULE_ACCESS"
      ];
      const SLUG_KEYS=[
        "digiy_resa_slug","digiy_resa_last_slug","resa_slug","DIGIY_RESA_SLUG",
        "digiy_last_slug","DIGIY_SLUG","digiy_slug"
      ];

      function setStatus(message){
        statusBox.textContent=message||"";
        statusBox.hidden=!message;
      }

      function read(storage,key){
        try{return storage.getItem(key)||""}catch(_){return ""}
      }

      function parse(raw){
        try{return JSON.parse(raw||"null")}catch(_){return null}
      }

      function normalizeSlug(value){
        return String(value||"").trim().toLowerCase()
          .replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"")
          .replace(/-+/g,"-").replace(/^-|-$/g,"");
      }

      function cleanHttps(value){
        const raw=String(value||"").trim();
        if(!raw)return "";
        try{
          const url=new URL(raw);
          return url.protocol==="https:"?url.toString():"";
        }catch(_){return ""}
      }

      function internalSlug(){
        for(const storage of [localStorage,sessionStorage]){
          for(const key of SESSION_KEYS){
            const session=parse(read(storage,key));
            const value=normalizeSlug(session?.slug||session?.pro_slug||session?.resa_slug||session?.subscription_slug||"");
            if(value)return value;
          }
          for(const key of SLUG_KEYS){
            const value=normalizeSlug(read(storage,key));
            if(value)return value;
          }
        }
        return "";
      }

      function ficheData(){
        const proSlug=internalSlug();
        if(!proSlug)return null;
        try{return parse(localStorage.getItem("DIGIY_RESA_FICHE_V2_"+proSlug))}catch(_){return null}
      }

      function businessData(){
        try{return parse(localStorage.getItem("digiy_resa_stable_biz_v1"))}catch(_){return null}
      }

      function resolvePublicUrl(){
        const direct=cleanHttps(read(localStorage,"digiy_resa_public_url"));
        if(direct)return direct;

        const fiche=ficheData()||{};
        const reservation=cleanHttps(fiche.reservationUrl||fiche.reservation_url||"");
        if(reservation)return reservation;

        const publicFiche=cleanHttps(fiche.publicFicheUrl||fiche.fiche_url||"");
        if(publicFiche)return publicFiche;

        const business=businessData()||{};
        const businessUrl=cleanHttps(business.publicLink||business.public_url||"");
        if(businessUrl)return businessUrl;

        return "";
      }

      shareButton.addEventListener("click",()=>{
        const publicUrl=resolvePublicUrl();
        if(!publicUrl){
          setStatus("Prépare d’abord ta fiche établissement et son lien public.");
          return;
        }
        const message="Bonjour, voici ma page de réservation DIGIY : "+publicUrl;
        setStatus("Ouverture de WhatsApp…");
        location.href="https://wa.me/?text="+encodeURIComponent(message);
      });
    })();
  </script>
